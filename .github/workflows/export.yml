name: Export overrides.json depuis Excel

on:
  push:
    paths:
      - 'Encyclopedie_FRJPKRCN*.xlsx'

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer xlsx
        run: npm install xlsx

      - name: Générer overrides.json + vider colonne export
        run: node .github/scripts/export_overrides.mjs

      - name: Commiter les changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overrides.json Encyclopedie_FRJPKRCN*.xlsx
          git diff --staged --quiet && echo "Pas de changement" || (git commit -m "auto: overrides.json mis à jour + export vidé" && git push)
